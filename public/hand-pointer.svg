<svg viewBox="0 0 100 100" width="32" height="32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <g id="hand">
      <!-- Index Finger -->
      <rect x="26" y="12" width="18" height="45" rx="9" />
      <!-- Middle Finger -->
      <rect x="42" y="25" width="18" height="35" rx="9" />
      <!-- Ring Finger -->
      <rect x="58" y="35" width="18" height="25" rx="9" />
      <!-- Pinky -->
      <rect x="74" y="45" width="18" height="20" rx="9" />
      <!-- Thumb -->
      <rect x="6" y="55" width="30" height="18" rx="9" transform="rotate(30 15 64)" />
      <!-- Palm -->
      <path d="M 26 45 L 92 45 L 92 75 C 92 90, 80 95, 65 95 L 45 95 C 30 95, 26 85, 26 70 Z" />
    </g>
  </defs>

  <!-- Dark Retro Outline -->
  <use href="#hand" fill="#2D2A26" stroke="#2D2A26" stroke-width="8" stroke-linejoin="round" stroke-linecap="round" />
  
  <!-- Inner Fill (Pink) -->
  <use href="#hand" fill="#FFBCB0" />
  
  <!-- Finger separators (Dark retro) -->
  <line x1="43" y1="34" x2="43" y2="60" stroke="#2D2A26" stroke-width="4" stroke-linecap="round" />
  <line x1="59" y1="44" x2="59" y2="65" stroke="#2D2A26" stroke-width="4" stroke-linecap="round" />
  <line x1="75" y1="54" x2="75" y2="70" stroke="#2D2A26" stroke-width="4" stroke-linecap="round" />
</svg>
